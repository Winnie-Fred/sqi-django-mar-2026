{% extends "partials/base.html" %}

{% block title %}
{{ book.title }}
{% endblock title %}


{% block body %}
<div>
    <h1>{{ book.title }}</h1>
    <p>By {{ book.author }}</p>
    <p>Number of pages: {{ book.number_of_pages }}</p>

    <img width="100" height="100" src="{{ book.cover_image.url }}" alt="Cover Image of {{ book.title }}">

    <div>
        Are you sure you want to delete {{ book.title }}?
        
        <form action="{% url 'library:delete_book' book.id %}" method="POST">
            {% csrf_token %}
            <button type="submit">Yes, I'm sure</button>
        </form>
    </div>

    <div>
        <a href="{% url 'library:book_detail' book.id %}">No, take me back</a>
    </div>


</div>

<div>
   
</div>

{% endblock body %}
