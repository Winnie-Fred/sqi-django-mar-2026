{% extends "partials/base.html" %}

{% block title %}
List of Books
{% endblock title %}


{% block body %}
<div>
    <h1>List of Books</h1>

    <div>
        {% for book in books %}

           <p>{{ book.title }}</p> 
           <img width="100" height="100" src="{{ book.cover_image.url }}" alt="Cover Image of {{ book.title }}">

        {% endfor %}
    </div>


</div>
{% endblock body %}
