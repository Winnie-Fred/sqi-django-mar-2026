{% extends "partials/base.html" %}

{% block title %}
Log In
{% endblock title %}


{% block body %}
<div>
    <h1>Log In</h1>

    <div>
        <form method="POST" action="{% url 'users:login' %}">
            {% csrf_token %}
            <input type="hidden" name="next" value="{{ request.GET.next }}">
            {{ form.as_p }}
            <button type="submit">Log In</button>
        </form>

        <p>Don't have an account yet?<a href="{% url 'users:sign_up' %}">Sign Up</a></p>

    </div>


</div>
{% endblock body %}
