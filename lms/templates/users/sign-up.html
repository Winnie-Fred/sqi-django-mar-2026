{% extends "partials/base.html" %}

{% block title %}
Sign Up
{% endblock title %}


{% block body %}
<div>
    <h1>Sign Up</h1>

    <div>
        <form method="POST">
            {% csrf_token %}
            {{ form.as_p }}
            <button type="submit">Sign Up</button>
        </form>

        <p>Already have an account?<a href="{% url 'users:login' %}">Log In</a></p>

    </div>


</div>
{% endblock body %}
